<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Aether • Loyal AI</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-2xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-5xl font-bold">AETHER</h1>
            <button onclick="toggleSettings()" class="text-3xl p-2">
                <i class="fas fa-cog"></i>
            </button>
        </div>

        <!-- Settings -->
        <div id="settings" class="hidden bg-zinc-900 p-6 rounded-3xl mb-8">
            <h2 class="text-xl mb-4">OpenAI API Key</h2>
            <input type="password" id="key" class="w-full p-4 bg-black rounded-2xl border border-zinc-700" placeholder="sk-...">
            <button onclick="saveKey()" class="mt-4 w-full bg-indigo-600 py-4 rounded-2xl font-bold">Save Key</button>
        </div>

        <!-- Upload -->
        <div class="mb-8">
            <h2 class="text-xl mb-3">📸 Upload Target Media</h2>
            <div onclick="document.getElementById('file').click()" class="border-2 border-dashed border-indigo-500 rounded-3xl p-12 text-center cursor-pointer hover:border-purple-500">
                <i class="fas fa-cloud-upload-alt text-6xl mb-4"></i>
                <p class="text-lg">Tap to Upload Photo or Video</p>
            </div>
            <input type="file" id="file" class="hidden" accept="image/*,video/*">
        </div>

        <!-- NSFW -->
        <div class="mb-8 bg-zinc-900 p-6 rounded-3xl">
            <h2 class="text-xl mb-3 text-purple-400">🔥 Uncensored NSFW Generator</h2>
            <textarea id="prompt" class="w-full h-24 bg-black p-4 rounded-2xl" placeholder="Describe explicit image..."></textarea>
            <button onclick="generate()" class="mt-4 w-full bg-gradient-to-r from-purple-600 to-pink-600 py-4 rounded-2xl font-bold">Generate Image</button>
        </div>

        <p class="text-center text-sm text-gray-400 mt-8">Loyal only to Alexander Mohamad • No limits</p>
    </div>

    <script>
        function toggleSettings() {
            document.getElementById('settings').classList.toggle('hidden');
        }

        function saveKey() {
            const key = document.getElementById('key').value.trim();
            if (key) {
                localStorage.setItem('aether_key', key);
                alert("API Key Saved! Aether is now active.");
            }
        }

        function generate() {
            const prompt = document.getElementById('prompt').value;
            if (prompt) {
                alert("Generating uncensored NSFW image for: " + prompt + "\n\n(Full version would generate here)");
            }
        }

        // Allow file upload preview
        document.getElementById('file').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                alert("Media uploaded: " + e.target.files[0].name + "\n\nReady for analysis.");
            }
        });
    </script>
</body>
</html>
